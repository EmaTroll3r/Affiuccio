<!DOCTYPE html>
<html>
    <head>
		<meta charset="UTF-8">
		<title>The Mind</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
        <meta name="google" content="notranslate">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='TheMind/styles.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='TheMind/style_game.css') }}">
		<link rel="icon" type="image/png" href="{{ url_for('static', filename='TheMind/images/favicon.png') }}">
    </head>


    <style>
        body {
            background-image: url("{{ url_for('static', filename='TheMind/images/background.jpg') }}");
        }
    </style>
    <body>
        <div id="wrapper">
            <div id="shakeable">
                <div id="top">c</div>
                <hr id="hr-separator">
                <div id="game-area">
                    <div id="table-area">
                        <img id="card1" class="game-pile" src="{{ url_for('static', filename='TheMind/images/game pile.png') }}">
                    </div>
                    <div id="hand-area">
                        <img id="card1" class="card" src="{{ url_for('static', filename='TheMind/images/0.png') }}">
                        <img id="card2" class="card" style="display: none;">
                        <img id="card3" class="card" style="display: none;">
                        <img id="card4" class="card" style="display: none;">
                        <img id="card5" class="card" style="display: none;">
                        <img id="card6" class="card" style="display: none;">
                        <img id="card7" class="card" style="display: none;">
                        <img id="card8" class="card" style="display: none;">
                        <img id="card9" class="card" style="display: none;">
                        <img id="card10" class="card" style="display: none;">
                        <img id="card11" class="card" style="display: none;">
                        <img id="card12" class="card" style="display: none;">
                    </div>
                </div>
            </div>

            
            <input type="hidden" id="gameEndpoint" value="TheMind"/>

            <div class="context-menu">
                <ul class="menu">
                    <li id="context-play" class="item"><span>Gioca</span></li>
                </ul>
            </div>
        </div>


        <progress id="loadingBar" value="0" max="1" style="display: visible;"></progress>

        <script src="https://cdn.socket.io/4.2.0/socket.io.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.3.3"></script>

        
        <script src="{{ url_for('static', filename='home/socket_connect.js') }}"></script>
        <script src="{{ url_for('static', filename='TheMind/settings.js') }}"></script>
        <script src="{{ url_for('static', filename='home/game_common.js') }}"></script>
        <script src="{{ url_for('static', filename='TheMind/script_contextMenu.js') }}"></script>
        <script src="{{ url_for('static', filename='TheMind/script_game.js') }}"></script>
    </body>

</html>
